name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      # - name: Lint
      #   run: npx ng lint

      - name: Build
        run: npx ng build --configuration production

      - name: Test
        run: npx ng test --watch=false --browsers=ChromeHeadlessNoSandbox