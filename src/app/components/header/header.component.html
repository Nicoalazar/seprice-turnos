<!-- Topbar -->
  <header class="topbar">
    <div class="topbar-izquierda">
      <div class="logo-box">
        <div class="logo-cross"></div>
      </div>
      <span class="brand-nombre">SePrice</span>

      <!-- Badge que muestra el rol actual -->
      <span class="badge-rol">
        {{ rolActivo === 'ADMIN' ? 'Personal administrativo' : 'Médico' }}
      </span>
    </div>

    <div class="topbar-derecha">
      <!-- Toggle para cambiar la vista - Solo visible para SUPER usuarios -->
      <div class="toggle-rol" *ngIf="esSuperUsuario()">
        <button
          class="btn-rol"
          [class.activo]="rolActivo === 'ADMIN'"
          (click)="cambiarRol('ADMIN')"
        >
          Administrativo
        </button>
        <button
          class="btn-rol"
          [class.activo]="rolActivo === 'MEDICO'"
          (click)="cambiarRol('MEDICO')"
        >
          Médico
        </button>
      </div>

      <!-- Usuario nombre - Dinámico -->
      <span class="usuario-nombre">
        {{ nombreUsuario }}
      </span>
      <!-- Usuario Menu Button en Avatar -->
      <button mat-icon-button [matMenuTriggerFor]="userMenu" class="avatar">
        {{ iniciales }}
      </button>

      <!-- User Menu -->
      <mat-menu #userMenu="matMenu" xPosition="before">
        <button mat-menu-item (click)="irAPerfil()">
          <mat-icon>person</mat-icon>
          <span>Ir a perfil</span>
        </button>
        <mat-divider />
        <button mat-menu-item (click)="logout()" class="item-danger">
          <mat-icon>logout</mat-icon>
          <span>Cerrar sesión</span>
        </button>
      </mat-menu>
    </div>
  </header>
