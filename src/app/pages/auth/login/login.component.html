<!-- Contenedor principal con el fondo -->
<div class="contenedor-login">
  <!-- La caja del formulario -->
  <div class="caja-login">
    <!-- Título de la aplicación -->
    <h1>SePrice Turnos</h1>
    <p class="subtitulo">Sistema de Agendamiento de Citas</p>

    <!-- Mensaje de error (si hay) -->
    <div *ngIf="error" class="alerta-error">
      {{ error }}
    </div>

    <!-- El formulario -->
    <form (ngSubmit)="iniciarSesion()">
      <!-- Campo de email -->
      <div class="grupo-formulario">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@email.com"
        />
      </div>

      <!-- Campo de contraseña -->
      <div class="grupo-formulario">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
        />
      </div>

      <!-- Botón para enviar el formulario -->
      <button type="submit" [disabled]="cargando" class="boton-login">
        <!-- Si está cargando mostrar "Cargando..." si no mostrar "Iniciar Sesión" -->
        <span *ngIf="!cargando">Iniciar Sesión</span>
        <span *ngIf="cargando">Cargando...</span>
      </button>
    </form>
  </div>
</div>
